<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#080808"/>
<title>Agendar Horário · BarberCash</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--surface:#111;--surface2:#1a1a1a;--border:#2a2a2a;--border2:#333;--gold:#c9a84c;--gold-light:#e8c870;--gold-dim:#7a6230;--text:#f0ede8;--muted:#777;--muted2:#444;--red:#e05555;--green:#4caf78;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{padding-bottom:40px}
#app{max-width:480px;margin:0 auto;padding:0 16px}
.hero{text-align:center;padding:32px 0 24px}
.hero-icon{width:68px;height:68px;background:var(--gold);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px}
.hero-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.hero-sub{font-size:13px;color:var(--muted)}
.hero-info{margin-top:10px;display:flex;align-items:center;justify-content:center;gap:14px;font-size:12px;color:var(--muted)}
.steps-bar{display:flex;align-items:center;justify-content:center;margin:0 0 24px}
.step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative;z-index:1}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);transition:all .3s}
.step.active .step-num{background:var(--gold);border-color:var(--gold);color:#000}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.step.active .step-label{color:var(--gold)}.step.done .step-label{color:var(--green)}
.step-line{flex:1;height:2px;background:var(--border);margin-bottom:14px;transition:background .3s;max-width:50px}
.step-line.done{background:var(--green)}
.section{margin-bottom:18px}
.section-title{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:12px}
.vaga-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.vaga-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;position:relative}
.vaga-card:hover{border-color:var(--gold-dim);background:var(--surface2)}
.vaga-card.selected{border-color:var(--gold);background:rgba(201,168,76,.08)}
.vaga-card.selected::after{content:'✓';position:absolute;top:8px;right:10px;font-size:13px;color:var(--gold)}
.vaga-dia{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.vaga-hora{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:2px}
.vaga-data{font-size:11px;color:var(--muted)}
.vaga-empty{text-align:center;padding:36px 16px;color:var(--muted);font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px}
.vaga-empty-icon{font-size:30px;margin-bottom:10px}
.servico-list{display:flex;flex-direction:column;gap:8px}
.servico-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center}
.servico-card:hover{border-color:var(--gold-dim)}
.servico-card.selected{border-color:var(--gold);background:rgba(201,168,76,.08)}
.servico-nome{font-size:15px;font-weight:500;flex:1}
.servico-preco{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);flex-shrink:0;margin:0 10px}
.servico-gratis{font-size:13px;color:var(--muted2);flex-shrink:0;margin:0 10px}
.servico-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0}
.servico-card.selected .servico-check{background:var(--gold);border-color:var(--gold);color:#000}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold-dim)}
textarea.inp{resize:none;height:80px;font-size:14px}
.resumo-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px}
.resumo-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px}
.resumo-row:last-child{border-bottom:none;margin-top:4px;padding-bottom:0}
.resumo-label{color:var(--muted)}.resumo-val{font-weight:500;color:var(--text)}
.resumo-preco{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold)}
.btn-primary{width:100%;padding:15px;background:var(--gold);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Playfair Display',serif;letter-spacing:1px;transition:opacity .2s;margin-bottom:10px}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}.btn-primary:active{opacity:.85}
.btn-outline{width:100%;padding:13px;background:none;border:1px solid var(--border);border-radius:12px;font-size:14px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-outline:hover{border-color:var(--muted);color:var(--text)}
.btn-nav{display:flex;gap:10px;margin-top:4px}
.btn-nav .btn-outline{flex:1}.btn-nav .btn-primary{flex:2;margin-bottom:0}
.success-screen{text-align:center;padding:44px 16px}
.success-icon{width:76px;height:76px;background:rgba(76,175,120,.15);border:2px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 18px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.success-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--green);margin-bottom:8px}
.success-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}
.success-detail{background:var(--surface2);border-radius:14px;padding:16px;margin-bottom:22px;text-align:left}
.success-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2);font-size:13px}
.success-row:last-child{border-bottom:none}
.success-row span:first-child{color:var(--muted)}
.btn-wpp{width:100%;padding:15px;background:#25D366;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'DM Sans',sans-serif;margin-bottom:10px}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;margin-right:4px;vertical-align:middle}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1}.toast.err{background:var(--red);color:#fff}.toast.ok{background:var(--green);color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div class="hero">
    <div class="hero-icon">✂</div>
    <div class="hero-title" id="hero-title">BarberCash</div>
    <div class="hero-sub">Agende seu horário de forma rápida e fácil</div>
    <div class="hero-info" id="hero-info">
      <span><span class="live-dot"></span>Vagas em tempo real</span>
    </div>
  </div>
  <div id="main-content">
    <div class="loading-wrap"><div class="spinner"></div><div>Carregando vagas...</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,setDoc,getDoc,getDocs,addDoc,updateDoc,collection,query,orderBy,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDsx8SKvD4DzyLZdvC3me5iBx0s6_qhJc8",authDomain:"barbercash-f6891.firebaseapp.com",projectId:"barbercash-f6891",storageBucket:"barbercash-f6891.firebasestorage.app",messagingSenderId:"222760224701",appId:"1:222760224701:web:afa93064a97b10c28c34d4"};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);
let state={step:1,vagas:[],servicos:[],adminCfg:{},selected:{vaga:null,servico:null,nome:'',whatsapp:'',obs:''}};
let toastTimer;
function toast(msg,tipo='err'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast show ${tipo}`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.className='toast',3000);}
function fmtDia(ts){return new Date(ts).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});}
function fmtHora(ts){return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function fmtPreco(v){return v?v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):''}
function fmtWpp(num){if(!num)return'';const n=num.replace(/\D/g,'');if(n.length===11)return`(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7)}`;return n;}
async function init(){
  try{
    const cfgDoc=await getDoc(doc(db,'admin','config'));
    state.adminCfg=cfgDoc.exists()?cfgDoc.data():{};
    const titulo=state.adminCfg.nomeBarbearia||'Barbearia';
    document.getElementById('hero-title').textContent=titulo;
    document.title=`Agendar · ${titulo}`;
    const end=state.adminCfg.enderecoBarbearia||'';
    document.getElementById('hero-info').innerHTML=`<span><span class="live-dot"></span>Vagas em tempo real</span>${end?`<span style="color:var(--muted2)">·</span><span>${end}</span>`:''}`;
    if(state.adminCfg.cortesPublicos&&state.adminCfg.cortesPublicos.length){
      state.servicos=state.adminCfg.cortesPublicos;
    }else{
      const userDocs=await getDocs(collection(db,'users'));
      for(const d of userDocs.docs){
        const cfg=await getDoc(doc(db,'users',d.id,'config','main'));
        if(cfg.exists()&&cfg.data().cortesLista&&cfg.data().cortesLista.length){state.servicos=cfg.data().cortesLista;break;}
      }
    }
  }catch(e){console.error(e);toast('Erro ao carregar configurações.');}
  const q=query(collection(db,'vagas'),orderBy('dataHora','asc'));
  onSnapshot(q,snap=>{
    state.vagas=snap.docs.map(d=>({id:d.id,...d.data()})).filter(v=>v.dataHora>Date.now()-300000&&v.disponivel!==false);
    if(state.step===1)render();
  },e=>{console.error(e);toast('Erro ao carregar vagas.');});
  render();
}
function render(){
  const el=document.getElementById('main-content');el.innerHTML='';
  if(state.step===1)el.appendChild(renderStepVaga());
  else if(state.step===2)el.appendChild(renderStepServico());
  else if(state.step===3)el.appendChild(renderStepDados());
  else if(state.step===4)el.appendChild(renderStepConfirm());
  else if(state.step===5)el.appendChild(renderSucesso());
  el.classList.remove('fade-up');void el.offsetWidth;el.classList.add('fade-up');
}
function stepBar(current){
  const steps=['Vaga','Serviço','Dados','Confirmar'];
  const frag=document.createElement('div');
  frag.innerHTML=`<div class="steps-bar">`+steps.map((s,i)=>{const n=i+1;const cls=n<current?'done':n===current?'active':'';const icon=n<current?'✓':String(n);const line=i<steps.length-1?`<div class="step-line${n<current?' done':''}"></div>`:'';return`<div class="step ${cls}"><div class="step-num">${icon}</div><div class="step-label">${s}</div></div>${line}`;}).join('')+`</div>`;
  return frag;
}
function renderStepVaga(){
  const frag=document.createDocumentFragment();frag.appendChild(stepBar(1));
  const sec=document.createElement('div');sec.className='section';
  sec.innerHTML=`<div class="section-title">📅 Vagas disponíveis</div>`;
  if(!state.vagas.length){
    sec.innerHTML+=`<div class="vaga-empty"><div class="vaga-empty-icon">😔</div><div style="font-weight:600;margin-bottom:6px">Nenhuma vaga disponível</div><div style="font-size:12px;color:var(--muted2)">O barbeiro ainda não cadastrou horários.<br>Volte em breve ou entre em contato.</div>${state.adminCfg.whatsapp?`<a href="https://wa.me/${(state.adminCfg.whatsapp||'').replace(/\D/g,'')}" target="_blank" style="display:inline-block;margin-top:16px;padding:10px 22px;background:#25D366;color:#fff;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none">💬 Chamar no WhatsApp</a>`:''}</div>`;
  }else{
    const grid=document.createElement('div');grid.className='vaga-grid';
    state.vagas.forEach(v=>{
      const card=document.createElement('div');const sel=state.selected.vaga?.id===v.id;
      card.className=`vaga-card${sel?' selected':''}`;
      card.innerHTML=`<div class="vaga-dia">${fmtDia(v.dataHora)}</div><div class="vaga-hora">${fmtHora(v.dataHora)}</div><div class="vaga-data">${new Date(v.dataHora).toLocaleDateString('pt-BR')}</div>`;
      card.onclick=()=>{state.selected.vaga=v;render();};grid.appendChild(card);
    });sec.appendChild(grid);
  }
  frag.appendChild(sec);
  if(state.selected.vaga){const btn=document.createElement('button');btn.className='btn-primary';btn.textContent='Próximo →';btn.onclick=()=>{state.step=2;render();};frag.appendChild(btn);}
  return frag;
}
function renderStepServico(){
  const frag=document.createDocumentFragment();frag.appendChild(stepBar(2));
  const sec=document.createElement('div');sec.className='section';
  sec.innerHTML=`<div class="section-title">✂ Escolha o serviço</div>`;
  const servs=state.servicos.length?state.servicos:[{nome:'Corte Simples',preco:35},{nome:'Degradê',preco:45},{nome:'Barba',preco:30},{nome:'Corte + Barba',preco:70}];
  const list=document.createElement('div');list.className='servico-list';
  servs.forEach(s=>{
    const sel=state.selected.servico?.nome===s.nome;const card=document.createElement('div');
    card.className=`servico-card${sel?' selected':''}`;
    card.innerHTML=`<div class="servico-nome">${s.nome}</div>${s.preco?`<div class="servico-preco">${fmtPreco(s.preco)}</div>`:`<div class="servico-gratis">—</div>`}<div class="servico-check">${sel?'✓':''}</div>`;
    card.onclick=()=>{state.selected.servico=s;render();};list.appendChild(card);
  });
  sec.appendChild(list);frag.appendChild(sec);
  const nav=document.createElement('div');nav.className='btn-nav';nav.innerHTML=`<button class="btn-outline" onclick="goBack()">← Voltar</button>`;
  const btnNext=document.createElement('button');btnNext.className='btn-primary';btnNext.textContent='Próximo →';btnNext.disabled=!state.selected.servico;btnNext.onclick=()=>{state.step=3;render();};nav.appendChild(btnNext);frag.appendChild(nav);
  return frag;
}
function renderStepDados(){
  const frag=document.createDocumentFragment();frag.appendChild(stepBar(3));
  const card=document.createElement('div');
  card.innerHTML=`<div class="section-title">👤 Seus dados</div><div class="field"><label>Seu nome *</label><input class="inp" id="inp-nome" placeholder="Ex: João Silva" value="${state.selected.nome}" maxlength="50"/></div><div class="field"><label>WhatsApp * (com DDD)</label><input class="inp" id="inp-wpp" type="tel" placeholder="(11) 99999-9999" value="${state.selected.whatsapp}" inputmode="tel"/></div><div class="field"><label>Pedido ao barbeiro (opcional)</label><textarea class="inp" id="inp-obs" placeholder="Ex: Quero degradê alto...">${state.selected.obs}</textarea></div>`;
  frag.appendChild(card);
  const nav=document.createElement('div');nav.className='btn-nav';nav.innerHTML=`<button class="btn-outline" onclick="goBack()">← Voltar</button>`;
  const btnNext=document.createElement('button');btnNext.className='btn-primary';btnNext.textContent='Revisar →';
  btnNext.onclick=()=>{
    const nome=document.getElementById('inp-nome').value.trim();const wpp=document.getElementById('inp-wpp').value.replace(/\D/g,'');const obs=document.getElementById('inp-obs').value.trim();
    if(!nome){toast('Digite seu nome.');return;}if(wpp.length<10){toast('Digite um WhatsApp válido.');return;}
    state.selected.nome=nome;state.selected.whatsapp=wpp;state.selected.obs=obs;state.step=4;render();
  };nav.appendChild(btnNext);frag.appendChild(nav);return frag;
}
function renderStepConfirm(){
  const frag=document.createDocumentFragment();frag.appendChild(stepBar(4));
  const{vaga,servico,nome,whatsapp,obs}=state.selected;
  const resumo=document.createElement('div');
  resumo.innerHTML=`<div class="section-title">📋 Confirme seu agendamento</div><div class="resumo-card"><div class="resumo-row"><span class="resumo-label">📅 Data e hora</span><span class="resumo-val">${fmtDia(vaga.dataHora)}, ${fmtHora(vaga.dataHora)}</span></div><div class="resumo-row"><span class="resumo-label">✂ Serviço</span><span class="resumo-val">${servico.nome}</span></div><div class="resumo-row"><span class="resumo-label">👤 Nome</span><span class="resumo-val">${nome}</span></div><div class="resumo-row"><span class="resumo-label">📱 WhatsApp</span><span class="resumo-val">${fmtWpp(whatsapp)}</span></div>${obs?`<div class="resumo-row"><span class="resumo-label">💬 Pedido</span><span class="resumo-val" style="max-width:200px;text-align:right;word-break:break-word">${obs}</span></div>`:''}${servico.preco?`<div class="resumo-row"><span class="resumo-label">💰 Valor estimado</span><span class="resumo-preco">${fmtPreco(servico.preco)}</span></div>`:''}</div>`;
  frag.appendChild(resumo);
  const nav=document.createElement('div');nav.className='btn-nav';nav.innerHTML=`<button class="btn-outline" onclick="goBack()">← Voltar</button>`;
  const btnConf=document.createElement('button');btnConf.className='btn-primary';btnConf.id='btn-confirmar';btnConf.textContent='✓ Confirmar!';btnConf.onclick=confirmar;nav.appendChild(btnConf);frag.appendChild(nav);return frag;
}
function renderSucesso(){
  const frag=document.createDocumentFragment();const{vaga,servico,nome}=state.selected;
  const el=document.createElement('div');el.className='success-screen';
  el.innerHTML=`<div class="success-icon">✓</div><div class="success-title">Agendado!</div><div class="success-sub">Seu horário foi reservado com sucesso.<br>Em breve o barbeiro pode entrar em contato.</div><div class="success-detail"><div class="success-row"><span>📅 Horário</span><span>${fmtDia(vaga.dataHora)}, ${fmtHora(vaga.dataHora)}</span></div><div class="success-row"><span>✂ Serviço</span><span>${servico.nome}</span></div>${servico.preco?`<div class="success-row"><span>💰 Valor</span><span style="color:var(--gold);font-family:'Playfair Display',serif">${fmtPreco(servico.preco)}</span></div>`:''}<div class="success-row"><span>👤 Nome</span><span>${nome}</span></div></div>${state.adminCfg.whatsapp?`<button class="btn-wpp" onclick="abrirWppBarbeiro()"><span style="font-size:20px">💬</span> Confirmar pelo WhatsApp</button>`:''}<button class="btn-outline" onclick="novoAgendamento()">Fazer outro agendamento</button>`;
  frag.appendChild(el);return frag;
}
window.goBack=()=>{state.step--;render();};
window.novoAgendamento=()=>{state.step=1;state.selected={vaga:null,servico:null,nome:'',whatsapp:'',obs:''};render();};
window.abrirWppBarbeiro=()=>{
  const wa=(state.adminCfg.whatsapp||'').replace(/\D/g,'');if(!wa)return;
  const{vaga,servico,nome}=state.selected;
  const msg=`Olá! Acabei de agendar pelo link:\n\n👤 *${nome}*\n📅 ${fmtDia(vaga.dataHora)}, ${fmtHora(vaga.dataHora)}\n✂ ${servico.nome}\n\nAguardo a confirmação! 🙏`;
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`,'_blank');
};
async function confirmar(){
  const btn=document.getElementById('btn-confirmar');if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const{vaga,servico,nome,whatsapp,obs}=state.selected;
  try{
    await addDoc(collection(db,'agendamentos'),{nome,whatsapp,servico:servico.nome,precoServico:servico.preco||0,obs,dataHora:vaga.dataHora,vagaId:vaga.id,atendido:false,origem:'booking',criadoEm:Date.now()});
    try{await setDoc(doc(db,'vagas',vaga.id),{disponivel:false,agendadoPor:nome},{merge:true});}catch(e){console.warn('Vaga não atualizada:',e);}
    state.step=5;render();
  }catch(e){console.error(e);toast('Erro ao confirmar. Tente novamente.');if(btn){btn.disabled=false;btn.textContent='✓ Confirmar!';}}
}
init();
</script>
</body>
</html>
