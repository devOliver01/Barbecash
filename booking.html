<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#080808"/>
<title>Agendar · BarberCash</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--surface:#111;--surface2:#1a1a1a;--border:#2a2a2a;--border2:#333;--gold:#c9a84c;--gold-light:#e8c870;--gold-dim:#7a6230;--text:#f0ede8;--muted:#777;--muted2:#444;--red:#e05555;--green:#4caf78;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{padding-bottom:60px}
#app{max-width:480px;margin:0 auto;padding:0 16px}
/* HERO */
.hero{text-align:center;padding:28px 0 20px}
.hero-icon{width:64px;height:64px;background:var(--gold);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px}
.hero-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.hero-sub{font-size:13px;color:var(--muted)}
.hero-info{margin-top:8px;font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:10px}
/* STEPS */
.steps-bar{display:flex;align-items:flex-start;justify-content:center;margin:0 0 22px}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);transition:all .3s}
.step.active .step-num{background:var(--gold);border-color:var(--gold);color:#000}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.step.active .step-label{color:var(--gold)}.step.done .step-label{color:var(--green)}
.step-line{flex:1;height:2px;background:var(--border);margin-top:13px;max-width:40px;transition:background .3s}
.step-line.done{background:var(--green)}
/* CARDS SERVIÇO */
.servico-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.servico-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.servico-card:active{opacity:.8}
.servico-card.selected{border-color:var(--gold);background:rgba(201,168,76,.08)}
.servico-icon{width:38px;height:38px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.servico-card.selected .servico-icon{background:rgba(201,168,76,.15)}
.servico-body{flex:1;min-width:0}
.servico-nome{font-size:15px;font-weight:500}
.servico-preco-val{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);flex-shrink:0}
.servico-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0}
.servico-card.selected .servico-check{background:var(--gold);border-color:var(--gold);color:#000}
/* CARDS VAGA */
.vaga-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.vaga-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;position:relative}
.vaga-card:active{opacity:.8}
.vaga-card.selected{border-color:var(--gold);background:rgba(201,168,76,.08)}
.vaga-card.selected::after{content:'✓';position:absolute;top:8px;right:10px;font-size:13px;color:var(--gold)}
.vaga-dia{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.vaga-hora{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:2px}
.vaga-data{font-size:11px;color:var(--muted)}
.vaga-empty{text-align:center;padding:36px 16px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:14px}
.vaga-empty-icon{font-size:32px;margin-bottom:10px}
/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold-dim)}
textarea.inp{resize:none;height:80px;font-size:14px}
/* RESUMO */
.resumo-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px}
.resumo-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px}
.resumo-row:last-child{border-bottom:none;padding-bottom:0}
.resumo-label{color:var(--muted)}.resumo-val{font-weight:500}
.resumo-preco{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold)}
/* BTNS */
.btn-gold{width:100%;padding:15px;background:var(--gold);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Playfair Display',serif;letter-spacing:1px;transition:opacity .2s;margin-bottom:10px}
.btn-gold:disabled{opacity:.45;cursor:not-allowed}.btn-gold:active{opacity:.82}
.btn-outline{width:100%;padding:13px;background:none;border:1px solid var(--border);border-radius:12px;font-size:14px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-outline:active{opacity:.8}
.btn-nav{display:flex;gap:10px;margin-top:6px}
.btn-nav .btn-outline{flex:1}.btn-nav .btn-gold{flex:2;margin-bottom:0}
/* SUCESSO */
.success-screen{text-align:center;padding:44px 0}
.success-icon{width:76px;height:76px;background:rgba(76,175,120,.15);border:2px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 18px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.success-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--green);margin-bottom:8px}
.success-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}
.success-detail{background:var(--surface2);border-radius:14px;padding:16px;margin-bottom:22px;text-align:left}
.success-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2);font-size:13px}
.success-row:last-child{border-bottom:none}
.success-row span:first-child{color:var(--muted)}
.btn-wpp{width:100%;padding:15px;background:#25D366;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'DM Sans',sans-serif;margin-bottom:10px}
/* UTILS */
.section-title{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:12px}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;margin-right:5px;vertical-align:middle}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1}.toast.err{background:var(--red);color:#fff}.toast.ok{background:var(--green);color:#fff}
.err-box{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--red);margin-bottom:14px;line-height:1.5}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .28s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div class="hero">
    <div class="hero-icon">✂</div>
    <div class="hero-title" id="hero-title">Barbearia</div>
    <div class="hero-sub">Agende seu horário de forma rápida e fácil</div>
    <div class="hero-info" id="hero-info"><span><span class="live-dot"></span>Vagas em tempo real</span></div>
  </div>
  <div id="main-content">
    <div class="loading-wrap"><div class="spinner"></div><div>Carregando...</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, addDoc, setDoc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyDsx8SKvD4DzyLZdvC3me5iBx0s6_qhJc8",
  authDomain:"barbercash-f6891.firebaseapp.com",
  projectId:"barbercash-f6891",
  storageBucket:"barbercash-f6891.firebasestorage.app",
  messagingSenderId:"222760224701",
  appId:"1:222760224701:web:afa93064a97b10c28c34d4"
};
const db = getFirestore(initializeApp(FB));

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  step: 1,   // 1=servico  2=vaga  3=dados  4=confirmar  5=sucesso
  servicos: [],
  vagas: [],
  cfg: {},
  sel: { servico:null, vaga:null, nome:'', wpp:'', obs:'' },
  erroConfirm: ''
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
let _tt;
function toast(msg, t='err'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast show ${t}`;
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='toast',4000);
}
const fmtDia  = ts => new Date(ts).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
const fmtHora = ts => new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const fmtR$   = v  => v ? v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '';
const fmtWpp  = n  => { const d=n.replace(/\D/g,''); return d.length===11?`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`:d; };

// ── INICIALIZAÇÃO ─────────────────────────────────────────────────────────────
async function init() {
  // 1. Config do admin
  try {
    const snap = await getDoc(doc(db,'admin','config'));
    S.cfg = snap.exists() ? snap.data() : {};
    const nome = S.cfg.nomeBarbearia || 'Barbearia';
    document.getElementById('hero-title').textContent = nome;
    document.title = `Agendar · ${nome}`;
    const end = S.cfg.enderecoBarbearia||'';
    document.getElementById('hero-info').innerHTML =
      `<span><span class="live-dot"></span>Vagas em tempo real</span>${end?`<span style="color:var(--muted2)">·</span><span>${end}</span>`:''}`;
  } catch(e){ console.error('cfg:',e); }

  // 2. Serviços — tenta cortesPublicos, senão pega do primeiro user
  try {
    if(S.cfg.cortesPublicos?.length){
      S.servicos = S.cfg.cortesPublicos;
    } else {
      const users = await getDocs(collection(db,'users'));
      for(const u of users.docs){
        const c = await getDoc(doc(db,'users',u.id,'config','main'));
        if(c.exists() && c.data().cortesLista?.length){ S.servicos=c.data().cortesLista; break; }
      }
    }
  } catch(e){ console.error('servicos:',e); }

  if(!S.servicos.length){
    S.servicos=[{nome:'Corte Simples',preco:35},{nome:'Degradê',preco:45},{nome:'Barba',preco:30},{nome:'Corte + Barba',preco:70}];
  }

  // 3. Listener tempo real nas vagas
  try {
    onSnapshot(
      query(collection(db,'vagas'), orderBy('dataHora','asc')),
      snap => {
        S.vagas = snap.docs.map(d=>({id:d.id,...d.data()}))
          .filter(v => v.dataHora > Date.now() && v.disponivel !== false);
        // Se o cliente estiver escolhendo vaga, atualiza ao vivo
        if(S.step === 2) render();
      },
      e => { console.error('vagas listener:',e); }
    );
  } catch(e){ console.error('vagas:',e); }

  render();
}

// ── RENDER PRINCIPAL ──────────────────────────────────────────────────────────
function render(){
  const el = document.getElementById('main-content');
  el.innerHTML = '';
  const fn = [,renderServico, renderVaga, renderDados, renderConfirmar, renderSucesso][S.step];
  if(fn) el.appendChild(fn());
  el.classList.remove('fade-up'); void el.offsetWidth; el.classList.add('fade-up');
}

// Barra de steps — labels adaptados à nova ordem
function stepBar(cur){
  const steps = ['Serviço','Horário','Dados','Confirmar'];
  const wrap = document.createElement('div');
  wrap.innerHTML = '<div class="steps-bar">' +
    steps.map((s,i)=>{
      const n=i+1, cls=n<cur?'done':n===cur?'active':'', icon=n<cur?'✓':String(n);
      const line = i<steps.length-1 ? `<div class="step-line${n<cur?' done':''}"></div>` : '';
      return `<div class="step ${cls}"><div class="step-num">${icon}</div><div class="step-label">${s}</div></div>${line}`;
    }).join('') + '</div>';
  return wrap;
}

// ── STEP 1: SERVIÇO ───────────────────────────────────────────────────────────
function renderServico(){
  const frag = document.createDocumentFragment();
  frag.appendChild(stepBar(1));

  const sec = document.createElement('div');
  sec.innerHTML = `<div class="section-title">✂ Escolha o serviço</div>`;

  const list = document.createElement('div');
  list.className = 'servico-list';
  S.servicos.forEach(s=>{
    const sel = S.sel.servico?.nome === s.nome;
    const card = document.createElement('div');
    card.className = `servico-card${sel?' selected':''}`;
    card.innerHTML = `
      <div class="servico-icon">✂</div>
      <div class="servico-body"><div class="servico-nome">${s.nome}</div></div>
      ${s.preco ? `<div class="servico-preco-val">${fmtR$(s.preco)}</div>` : ''}
      <div class="servico-check">${sel?'✓':''}</div>`;
    card.onclick = ()=>{ S.sel.servico=s; render(); };
    list.appendChild(card);
  });
  sec.appendChild(list);
  frag.appendChild(sec);

  if(S.sel.servico){
    const btn = document.createElement('button');
    btn.className='btn-gold'; btn.textContent='Escolher horário →';
    btn.onclick=()=>{ S.step=2; render(); };
    frag.appendChild(btn);
  }
  return frag;
}

// ── STEP 2: VAGA ─────────────────────────────────────────────────────────────
function renderVaga(){
  const frag = document.createDocumentFragment();
  frag.appendChild(stepBar(2));

  const sec = document.createElement('div');
  sec.innerHTML = `<div class="section-title">📅 Vagas disponíveis</div>`;

  if(!S.vagas.length){
    sec.innerHTML += `<div class="vaga-empty">
      <div class="vaga-empty-icon">😔</div>
      <div style="font-weight:600;margin-bottom:6px">Nenhuma vaga disponível agora</div>
      <div style="font-size:12px;color:var(--muted2);margin-bottom:14px">Volte em breve ou entre em contato.</div>
      ${S.cfg.whatsapp
        ? `<a href="https://wa.me/${(S.cfg.whatsapp||'').replace(/\D/g,'')}" target="_blank"
            style="display:inline-block;padding:11px 24px;background:#25D366;color:#fff;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none">
            💬 Chamar no WhatsApp</a>` : ''}
    </div>`;
  } else {
    const grid = document.createElement('div');
    grid.className='vaga-grid';
    S.vagas.forEach(v=>{
      const sel = S.sel.vaga?.id===v.id;
      const card = document.createElement('div');
      card.className = `vaga-card${sel?' selected':''}`;
      card.innerHTML = `
        <div class="vaga-dia">${fmtDia(v.dataHora)}</div>
        <div class="vaga-hora">${fmtHora(v.dataHora)}</div>
        <div class="vaga-data">${new Date(v.dataHora).toLocaleDateString('pt-BR')}</div>`;
      card.onclick=()=>{ S.sel.vaga=v; render(); };
      grid.appendChild(card);
    });
    sec.appendChild(grid);
  }
  frag.appendChild(sec);

  const nav = document.createElement('div');
  nav.className='btn-nav';
  nav.innerHTML=`<button class="btn-outline" onclick="goBack()">← Voltar</button>`;
  if(S.sel.vaga){
    const btn=document.createElement('button');
    btn.className='btn-gold'; btn.textContent='Meus dados →';
    btn.onclick=()=>{ S.step=3; render(); };
    nav.appendChild(btn);
  }
  frag.appendChild(nav);
  return frag;
}

// ── STEP 3: DADOS ─────────────────────────────────────────────────────────────
function renderDados(){
  const frag = document.createDocumentFragment();
  frag.appendChild(stepBar(3));

  const sec = document.createElement('div');
  sec.innerHTML = `<div class="section-title">👤 Seus dados</div>
    <div class="field"><label>Seu nome *</label>
      <input class="inp" id="inp-nome" placeholder="Ex: João Silva" value="${S.sel.nome}" maxlength="50" autocomplete="name"/>
    </div>
    <div class="field"><label>WhatsApp * (com DDD)</label>
      <input class="inp" id="inp-wpp" type="tel" placeholder="(11) 99999-9999" value="${S.sel.wpp}" inputmode="tel" autocomplete="tel"/>
    </div>
    <div class="field"><label>Pedido ao barbeiro (opcional)</label>
      <textarea class="inp" id="inp-obs" placeholder="Ex: Quero degradê alto, deixa a barba longa...">${S.sel.obs}</textarea>
    </div>`;
  frag.appendChild(sec);

  const nav = document.createElement('div');
  nav.className='btn-nav';
  nav.innerHTML=`<button class="btn-outline" onclick="goBack()">← Voltar</button>`;
  const btn=document.createElement('button');
  btn.className='btn-gold'; btn.textContent='Revisar →';
  btn.onclick=()=>{
    const nome=document.getElementById('inp-nome').value.trim();
    const wpp=document.getElementById('inp-wpp').value.replace(/\D/g,'');
    const obs=document.getElementById('inp-obs').value.trim();
    if(!nome){ toast('Digite seu nome.'); return; }
    if(wpp.length<10){ toast('Digite um WhatsApp válido (com DDD).'); return; }
    S.sel.nome=nome; S.sel.wpp=wpp; S.sel.obs=obs;
    S.step=4; render();
  };
  nav.appendChild(btn);
  frag.appendChild(nav);
  return frag;
}

// ── STEP 4: CONFIRMAR ─────────────────────────────────────────────────────────
function renderConfirmar(){
  const frag = document.createDocumentFragment();
  frag.appendChild(stepBar(4));

  const {servico,vaga,nome,wpp,obs} = S.sel;
  const resumo = document.createElement('div');
  resumo.innerHTML = `
    <div class="section-title">📋 Confirme seu agendamento</div>
    ${S.erroConfirm ? `<div class="err-box">⚠️ ${S.erroConfirm}</div>` : ''}
    <div class="resumo-card">
      <div class="resumo-row"><span class="resumo-label">✂ Serviço</span><span class="resumo-val">${servico.nome}</span></div>
      <div class="resumo-row"><span class="resumo-label">📅 Data e hora</span><span class="resumo-val">${fmtDia(vaga.dataHora)}, ${fmtHora(vaga.dataHora)}</span></div>
      <div class="resumo-row"><span class="resumo-label">👤 Nome</span><span class="resumo-val">${nome}</span></div>
      <div class="resumo-row"><span class="resumo-label">📱 WhatsApp</span><span class="resumo-val">${fmtWpp(wpp)}</span></div>
      ${obs?`<div class="resumo-row"><span class="resumo-label">💬 Pedido</span><span class="resumo-val" style="max-width:55%;text-align:right;word-break:break-word">${obs}</span></div>`:''}
      ${servico.preco?`<div class="resumo-row" style="margin-top:4px"><span class="resumo-label">💰 Valor estimado</span><span class="resumo-preco">${fmtR$(servico.preco)}</span></div>`:''}
    </div>`;
  frag.appendChild(resumo);

  const nav = document.createElement('div');
  nav.className='btn-nav';
  nav.innerHTML=`<button class="btn-outline" onclick="goBack()">← Voltar</button>`;
  const btn=document.createElement('button');
  btn.className='btn-gold'; btn.id='btn-confirmar'; btn.textContent='✓ Confirmar!';
  btn.onclick=confirmar;
  nav.appendChild(btn);
  frag.appendChild(nav);
  return frag;
}

// ── STEP 5: SUCESSO ───────────────────────────────────────────────────────────
function renderSucesso(){
  const frag = document.createDocumentFragment();
  const {servico,vaga,nome} = S.sel;
  const el = document.createElement('div');
  el.className='success-screen';
  el.innerHTML=`
    <div class="success-icon">✓</div>
    <div class="success-title">Agendado com sucesso!</div>
    <div class="success-sub">Seu horário foi reservado.<br>O barbeiro pode entrar em contato para confirmar.</div>
    <div class="success-detail">
      <div class="success-row"><span>✂ Serviço</span><span>${servico.nome}</span></div>
      <div class="success-row"><span>📅 Horário</span><span>${fmtDia(vaga.dataHora)}, ${fmtHora(vaga.dataHora)}</span></div>
      ${servico.preco?`<div class="success-row"><span>💰 Valor</span><span style="color:var(--gold);font-family:'Playfair Display',serif">${fmtR$(servico.preco)}</span></div>`:''}
      <div class="success-row"><span>👤 Nome</span><span>${nome}</span></div>
    </div>
    ${S.cfg.whatsapp
      ? `<button class="btn-wpp" onclick="confirmarWpp()"><span style="font-size:20px">💬</span>Confirmar pelo WhatsApp</button>` : ''}
    <button class="btn-outline" onclick="novoAgendamento()">Fazer outro agendamento</button>`;
  frag.appendChild(el);
  return frag;
}

// ── AÇÕES ─────────────────────────────────────────────────────────────────────
window.goBack = ()=>{ S.erroConfirm=''; S.step--; render(); };
window.novoAgendamento = ()=>{
  S.step=1; S.erroConfirm='';
  S.sel={servico:null,vaga:null,nome:'',wpp:'',obs:''};
  render();
};
window.confirmarWpp = ()=>{
  const wa=(S.cfg.whatsapp||'').replace(/\D/g,''); if(!wa)return;
  const {servico,vaga,nome}=S.sel;
  const msg=`Olá! Acabei de agendar:\n\n👤 *${nome}*\n✂ ${servico.nome}\n📅 ${fmtDia(vaga.dataHora)}, ${fmtHora(vaga.dataHora)}\n\nAguardo confirmação! 🙏`;
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`,'_blank');
};

async function confirmar(){
  const btn=document.getElementById('btn-confirmar');
  if(btn){ btn.disabled=true; btn.textContent='Salvando...'; }
  S.erroConfirm='';

  const {servico,vaga,nome,wpp,obs}=S.sel;

  try {
    // 1. Salva agendamento
    await addDoc(collection(db,'agendamentos'), {
      nome,
      whatsapp: wpp,
      servico:  servico.nome,
      precoServico: servico.preco||0,
      obs,
      dataHora: vaga.dataHora,
      vagaId:   vaga.id,
      atendido: false,
      origem:   'booking',
      criadoEm: Date.now()
    });

    // 2. Marca vaga como ocupada (setDoc com merge para não exigir permissão de update)
    try {
      await setDoc(doc(db,'vagas',vaga.id), { disponivel:false, agendadoPor:nome }, { merge:true });
    } catch(ev){
      console.warn('Não foi possível marcar vaga como ocupada:', ev.message);
      // Não bloqueia o fluxo — agendamento já foi salvo
    }

    S.step=5; render();

  } catch(e) {
    console.error('Erro ao confirmar:', e);
    // Mostra mensagem de erro detalhada na tela (não só toast)
    let msg='Não foi possível confirmar o agendamento.';
    if(e.code==='permission-denied') msg='Permissão negada pelo servidor. O barbeiro precisa verificar as regras do Firestore.';
    else if(e.code==='unavailable')  msg='Sem conexão. Verifique sua internet e tente novamente.';
    else if(e.message)               msg=e.message;
    S.erroConfirm = msg;
    render(); // re-renderiza step 4 com o erro exibido
    if(btn){ btn.disabled=false; btn.textContent='✓ Confirmar!'; }
  }
}

init();
</script>

</html>
