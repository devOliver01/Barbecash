<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BarberCash</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />

  <!-- QR Code library com fallbacks -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js" onerror="loadQrFallback()"></script>
  <script>
    function loadQrFallback() {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
      s.onerror = function () {
        var s2 = document.createElement('script');
        s2.src = 'https://unpkg.com/qrcode-generator@1.4.4/qrcode.js';
        document.head.appendChild(s2);
      };
      document.head.appendChild(s);
    }
  </script>
</head>

<body>
  <!-- ── ÁREA PRINCIPAL DO APP ─────────────────────────────────────── -->
  <div id="app">
    <div id="root-content" style="height:100%;display:flex;flex-direction:column"></div>
  </div>

  <!--
    Os modais e sheets são injetados dinamicamente pelo main.js
    via a função injetarHTML() de cada módulo:

      shared.html        → sheets (cliente, sumiu), toast, overlayConfirm
      configuracoes.html → modalCortes, modalBarbeiros, modalMeta,
                           modalNome, modalPix, modalCredenciais, modalUpgrade
      agenda-modais.html → modalVagas, modalRegAgenda
  -->

  <!-- ── MÓDULO PRINCIPAL (ES6) ────────────────────────────────────── -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
